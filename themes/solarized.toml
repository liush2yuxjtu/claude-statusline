bar_filled = "▰"
bar_empty  = "▱"
icon_high  = "☀"
icon_mid   = "◐"
icon_low   = "☁"

[effort]
default = "faint"
low     = "blue"
medium  = "cyan"
high    = "magenta"
max     = "magenta"

[bar]
high = "green"
mid  = "yellow"
low  = "red"

[ctx]
high = "green"
mid  = "yellow"
low  = "red"

[error]
no_token = ""
net      = "red"
auth     = "red"
http     = "yellow"
generic  = "red"
