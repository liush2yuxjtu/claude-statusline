# vivid theme — high contrast, accessibility-friendly.
# Bright colors against a dark background.

dir_color    = "bold_green"
branch_color = "bold_yellow"
sep_color    = "bold_white"

branch_glyph = "★"
sep_glyph    = "▌"

bar_filled = "▓"
bar_empty  = "░"
icon_high  = "⚡"
icon_mid   = "▮"
icon_low   = "‼"

[effort]
