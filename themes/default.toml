# default theme — matches the look of the original personal script

# ANSI color names. Recognized: black red green yellow blue magenta cyan white
# (each with bold_ prefix for bright), plus `dim` and `faint`. Use "" for no color.
dir_color    = "bold_cyan"
branch_color = "bold_yellow"
sep_color    = "dim"

# Glyphs
branch_glyph = "🌿"
sep_glyph    = "│"

# Battery bar
bar_filled = "█"
bar_empty  = "░"
icon_high  = "⚡"   # used when r >= high_icon_pct
icon_mid   = "🔋"   # used otherwise
icon_low   = "🪫"   # used when r < low_icon_pct

# Effort level colors. Keys match what MiniMax emits (lower-case).
[effort]
default = "faint"
low     = "bold_blue"
medium  = "bold_cyan"
high    = "bold_magenta"
max     = "bold_magenta"

# Provider (5h) bar colors
[bar]
high   = "bold_green"   # r > green_below
mid    = "bold_yellow"  # r >= yellow_below
low    = "bold_red"     # r < yellow_below

# ctx remaining-percent colors
[ctx]
high = "bold_green"
mid  = "bold_yellow"
low  = "bold_red"

# Error states
[error]
no_token = ""         # silent skip
net      = "bold_red"
auth     = "bold_red"
http     = "bold_yellow"
generic  = "bold_red"
